<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b0b0c" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>Rewards</title>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="title">Rewards</div>
      <button class="chip" id="resetBtn" title="Reset data">Reset</button>
    </header>

    <main class="content">
      <!-- HOME -->
      <section class="screen active" id="screen-home">
        <div class="card big">
          <div class="label">Balance</div>
          <div class="balance" id="balanceBig">0</div>
          <div class="subtle" id="balanceSub">points available</div>
        </div>

        <div class="row">
          <div class="card">
            <div class="label">This week</div>
            <div class="stat" id="earnedWeek">+0</div>
            <div class="subtle">earned</div>
          </div>
          <div class="card">
            <div class="label">This week</div>
            <div class="stat" id="spentWeek">-0</div>
            <div class="subtle">spent</div>
          </div>
        </div>

        <div class="card">
          <div class="label">Recent</div>
          <div class="list" id="recentList"></div>
        </div>
      </section>

      <!-- EARN -->
      <section class="screen" id="screen-earn">
        <div class="card">
          <div class="label">Earn points</div>
          <div class="grid" id="earnGrid"></div>
        </div>

        <div class="card">
          <div class="label">Add new earn action</div>
          <div class="form">
            <input id="earnName" placeholder="Action (e.g., Gym)" />
            <input id="earnPts" placeholder="Points" inputmode="numeric" />
            <button class="btn" id="addEarnBtn">Add</button>
          </div>
        </div>
      </section>

      <!-- SHOP -->
      <section class="screen" id="screen-shop">
        <div class="card">
          <div class="label">Rewards shop</div>
          <div class="grid" id="shopGrid"></div>
        </div>

        <div class="card">
          <div class="label">Add new reward</div>
          <div class="form">
            <input id="rewardName" placeholder="Reward (e.g., Date Night)" />
            <input id="rewardCost" placeholder="Cost" inputmode="numeric" />
            <button class="btn" id="addRewardBtn">Add</button>
          </div>
        </div>
      </section>

      <!-- RULES -->
      <section class="screen" id="screen-rules">
        <div class="card">
          <div class="label">How to earn</div>
          <div class="list" id="rulesList"></div>
        </div>

        <div class="card">
          <div class="label">Add rule</div>
          <div class="form">
            <input id="ruleText" placeholder="Rule (e.g., 2x points on Sundays)" />
            <button class="btn" id="addRuleBtn">Add</button>
          </div>
        </div>
      </section>

      <!-- HISTORY -->
      <section class="screen" id="screen-history">
        <div class="card">
          <div class="label">History</div>
          <div class="list" id="historyList"></div>
        </div>
        <div class="card">
          <div class="label">Quick adjust</div>
          <div class="form">
            <input id="adjReason" placeholder="Reason (optional)" />
            <input id="adjPts" placeholder="+ / - points (e.g., -10)" inputmode="numeric" />
            <button class="btn" id="addAdjBtn">Apply</button>
          </div>
        </div>
      </section>

      <!-- CALENDAR -->
      <section class="screen" id="screen-calendar">
        <div class="card">
          <div class="label">Dates & plans</div>
          <div class="list" id="calendarList"></div>
        </div>

        <div class="card">
          <div class="label">Add event</div>
          <div class="form">
            <input id="eventTitle" placeholder="Title (e.g., Dinner)" />
            <input id="eventDate" type="date" />
            <button class="btn" id="addEventBtn">Add</button>
          </div>
        </div>
      </section>
    </main>

    <nav class="tabbar">
      <button class="tab active" data-to="home">Home</button>
      <button class="tab" data-to="earn">Earn</button>
      <button class="tab" data-to="shop">Shop</button>
      <button class="tab" data-to="rules">Rules</button>
      <button class="tab" data-to="history">History</button>
      <button class="tab" data-to="calendar">Calendar</button>
    </nav>
  </div>

  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
